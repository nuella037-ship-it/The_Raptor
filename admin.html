<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – The Raptor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .site-logo {
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            color: #212529;
        }
        .site-logo span {
            color: #1e8449;
        }
        .text-green {
            color: #1e8449;
        }
        .bg-green {
            background-color: #1e8449;
        }
        .list-group-item {
            border-left: 4px solid #1a5276;
        }
        .list-group-item .badge {
            margin-left: 0.5rem;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1060;
        }
        .toast {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 0.75rem 1.25rem;
            margin-bottom: 0.5rem;
            min-width: 250px;
            border-left: 4px solid #1e8449;
            display: none;
        }
        .toast.error {
            border-left-color: #dc3545;
        }
    </style>
</head>
<body>

    <!-- Simple header for admin -->
    <header class="site-header">
        <div class="container">
            <div class="row align-items-center py-3">
                <div class="col-6">
                    <a href="index.html" class="site-logo">The<span>Raptor</span></a>
                </div>
                <div class="col-6 text-end">
                    <a href="index.html" class="btn btn-outline-primary btn-sm"><i class="fas fa-home"></i> Home</a>
                </div>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <h1 class="fw-bold">Dashboard <span class="text-green">Articles</span></h1>
                    <p class="text-muted">Add, edit, or delete articles. They are stored in the Supabase cloud database.</p>

                    <!-- Add Article Form -->
                    <div class="card border-0 shadow-sm p-4 mb-4">
                        <h4 class="fw-bold">Add New Article</h4>
                        <form id="articleForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Title *</label>
                                    <input type="text" id="articleTitle" class="form-control" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Category *</label>
                                    <input type="text" id="articleCategory" class="form-control" required placeholder="e.g. Technology" />
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Content *</label>
                                    <textarea id="articleContent" class="form-control" rows="4" required></textarea>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Author *</label>
                                    <input type="text" id="articleAuthor" class="form-control" required />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Date (optional)</label>
                                    <input type="date" id="articleDate" class="form-control" />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Image URL (optional)</label>
                                    <input type="text" id="articleImage" class="form-control" placeholder="https://example.com/image.jpg" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tags (comma separated)</label>
                                    <input type="text" id="articleTags" class="form-control" placeholder="AI, Healthcare" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Read Time (e.g. 5 min read)</label>
                                    <input type="text" id="articleReadTime" class="form-control" placeholder="5 min read" />
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Article</button>
                                    <span id="formStatus" class="text-muted ms-2"></span>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Article List -->
                    <div class="card border-0 shadow-sm p-4">
                        <h4 class="fw-bold">Manage Articles</h4>
                        <div id="adminArticleList" class="list-group">
                            <!-- Populated by JS -->
                            <div class="text-muted">Loading articles...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast notifications -->
    <div class="toast-container">
        <div id="toastMessage" class="toast">Success!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ============================================================
        //  SUPABASE CONFIG – REPLACE THESE WITH YOUR ACTUAL KEYS
        // ============================================================
        const SUPABASE_URL = "https://aslkopamkdnvofjqzgjz.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_yZ8KyiOxJT3GBR_6wX1Plw_Yt_5IQ6f";

        // Initialize Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ADMIN FUNCTIONS
        // ============================================================

        // Load articles and render the list
        async function loadAdminArticles() {
            const container = document.getElementById('adminArticleList');
            if (!container) return;

            try {
                const { data, error } = await supabase
                    .from('articles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="text-muted">No articles yet. Add one above.</div>';
                    return;
                }

                let html = '';
                data.forEach(article => {
                    html += `
                        <div class="list-group-item d-flex justify-content-between align-items-start">
                            <div>
                                <strong>${article.title}</strong> <span class="badge bg-primary">${article.category}</span>
                                <br /><small class="text-muted">${article.author || 'Editor'} • ${article.date || new Date(article.created_at).toLocaleDateString()}</small>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteArticle('${article.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error('Failed to load articles:', err);
                container.innerHTML = '<div class="text-danger">Error loading articles. Check console.</div>';
            }
        }

        // Add a new article
        async function addArticle(articleData) {
            try {
                const { data, error } = await supabase
                    .from('articles')
                    .insert([articleData])
                    .select();

                if (error) throw error;
                showToast('Article published successfully!', 'success');
                return data;
            } catch (err) {
                console.error('Add error:', err);
                showToast('Failed to add article: ' + err.message, 'error');
                throw err;
            }
        }

        // Delete an article
        window.deleteArticle = async function(id) {
            if (!confirm('Delete this article permanently?')) return;

            try {
                const { error } = await supabase
                    .from('articles')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showToast('Article deleted.', 'success');
                loadAdminArticles(); // refresh list
            } catch (err) {
                console.error('Delete error:', err);
                showToast('Failed to delete: ' + err.message, 'error');
            }
        };

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'error') toast.classList.add('error');
            toast.style.display = 'block';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        // ============================================================
        //  FORM HANDLER
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Load initial list
            loadAdminArticles();

            const form = document.getElementById('articleForm');
            const statusSpan = document.getElementById('formStatus');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const submitBtn = this.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                statusSpan.textContent = 'Saving...';

                // Gather data
                const title = document.getElementById('articleTitle').value.trim();
                const category = document.getElementById('articleCategory').value.trim();
                const content = document.getElementById('articleContent').value.trim();
                const author = document.getElementById('articleAuthor').value.trim();
                const date = document.getElementById('articleDate').value || new Date().toISOString().split('T')[0];
                const image = document.getElementById('articleImage').value.trim() || null;
                const tagsRaw = document.getElementById('articleTags').value.trim();
                const tags = tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
                const readTime = document.getElementById('articleReadTime').value.trim() || '4 min read';

                // Validation
                if (!title || !category || !content || !author) {
                    alert('Please fill in all required fields (Title, Category, Content, Author)');
                    submitBtn.disabled = false;
                    statusSpan.textContent = '';
                    return;
                }

                const newArticle = {
                    title,
                    category,
                    content,
                    author,
                    date,
                    image,
                    tags,
                    readTime,
                    comments: 0,
                    shares: 0,
                    excerpt: content.substring(0, 120) + '…',
                    // created_at will be set by Supabase default (now())
                };

                try {
                    const result = await addArticle(newArticle);
                    if (result) {
                        form.reset();
                        loadAdminArticles(); // refresh list
                        statusSpan.textContent = '✅ Added!';
                        setTimeout(() => statusSpan.textContent = '', 3000);
                    }
                } catch (err) {
                    // error already shown via toast
                } finally {
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
